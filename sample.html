<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERNAL.LY — Life Extension Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0c;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: #2a2a3a;
            --text: #e0e0e8;
            --text-dim: #7a7a8e;
            --green: #00e676;
            --green-dim: #004d25;
            --red: #ff1744;
            --amber: #ffab00;
            --cyan: #00e5ff;
            --pink: #f50057;
            --purple: #d500f9;
            --gold: #ffd600;
            --blue: #448aff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: filter 2s;
        }

        .mono { font-family: 'IBM Plex Mono', monospace; }

        /* HEADER */
        header {
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .logo span { color: var(--green); }
        .tagline {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .phase-label {
            font-size: 12px;
            color: var(--cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 32px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 18px;
            color: var(--green);
            font-weight: 600;
        }
        .stat-value.lifespan { color: var(--amber); }
        .stat-value.fatigue { color: var(--red); }

        /* MAIN LAYOUT */
        .main {
            display: grid;
            grid-template-columns: 300px 1fr 340px;
            min-height: calc(100vh - 110px);
        }

        /* LEFT PANEL - CLICKER */
        .clicker-panel {
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .click-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid var(--green);
            background: radial-gradient(circle at 40% 40%, #1a3a1a, #0a0a0c);
            color: var(--green);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.1s;
            user-select: none;
            text-align: center;
            line-height: 1.4;
        }
        .click-btn:hover {
            background: radial-gradient(circle at 40% 40%, #1a4a1a, #0a0a0c);
            box-shadow: 0 0 30px rgba(0,230,118,0.15);
        }
        .click-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px rgba(0,230,118,0.3);
        }

        .click-info {
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
        }
        .click-info strong {
            color: var(--green);
            font-family: 'IBM Plex Mono', monospace;
        }

        .float-text {
            position: absolute;
            pointer-events: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--green);
            animation: floatUp 1s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        /* SOUL FATIGUE */
        .soul-section {
            width: 100%;
            margin-top: auto;
        }
        .soul-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .soul-bar-bg {
            width: 100%;
            height: 8px;
            background: var(--surface2);
            border-radius: 4px;
            overflow: hidden;
        }
        .soul-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--red));
            width: 0%;
            transition: width 0.5s;
            border-radius: 4px;
        }

        /* SOCIAL MEDIA SECTION */
        .social-section {
            width: 100%;
            display: none;
        }
        .social-section.visible { display: block; }
        .social-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--pink);
            background: transparent;
            color: var(--pink);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .social-btn:hover:not(:disabled) {
            background: rgba(245,0,87,0.1);
        }
        .social-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .followers-count {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            text-align: center;
        }
        .followers-count span { color: var(--pink); font-weight: 600; }

        /* SELL DATA SECTION */
        .data-section {
            width: 100%;
            display: none;
            margin-top: 8px;
        }
        .data-section.visible { display: block; }
        .data-toggle {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .data-toggle.active {
            background: rgba(0,229,255,0.1);
            border-style: dashed;
        }
        .data-toggle:hover { background: rgba(0,229,255,0.05); }

        /* CENTER PANEL - UPGRADES */
        .upgrades-panel {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(100vh - 110px);
        }
        .tier-group { margin-bottom: 24px; }
        .tier-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .upgrade-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
        }
        .upgrade-card.visible { display: block; }
        .upgrade-card:hover:not(.disabled) {
            border-color: var(--green);
            background: var(--surface2);
        }
        .upgrade-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .upgrade-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .upgrade-name {
            font-weight: 600;
            font-size: 14px;
        }
        .upgrade-cost {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--green);
        }
        .upgrade-cost.cant-afford { color: var(--red); }
        .upgrade-desc {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .upgrade-stats {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--cyan);
        }
        .upgrade-owned {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* RIGHT PANEL - EVENT LOG */
        .log-panel {
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .log-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .log-feed {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 160px);
        }
        .log-entry {
            padding: 8px 10px;
            font-size: 12px;
            border-bottom: 1px solid rgba(42,42,58,0.5);
            animation: fadeIn 0.3s;
        }
        .log-entry .timestamp {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            margin-right: 6px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .log-entry.system { color: var(--text-dim); }
        .log-entry.intrusive { color: #ffcc80; font-style: italic; }
        .log-entry.techno { color: var(--cyan); }
        .log-entry.news { color: var(--red); }
        .log-entry.achievement { color: var(--gold); }
        .log-entry.social { color: var(--pink); }
        .log-entry.soul { color: var(--purple); }
        .log-entry.purchase { color: var(--green); }
        .log-entry.phase { color: var(--amber); font-weight: 600; }
        .log-entry.ending { color: #fff; font-weight: 600; }

        /* ENDGAME OVERLAY */
        .endgame-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            text-align: center;
            animation: fadeIn 2s;
        }
        .endgame-overlay.visible { display: flex; }
        .endgame-overlay h1 {
            font-size: 36px;
            margin-bottom: 24px;
            color: var(--green);
        }
        .endgame-overlay p {
            font-size: 16px;
            color: var(--text-dim);
            max-width: 500px;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .endgame-overlay .final-stats {
            margin-top: 24px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 2;
        }
        .endgame-overlay .final-stats span { color: var(--green); }
        .endgame-overlay .kicker {
            margin-top: 32px;
            color: var(--red);
            font-size: 14px;
        }

        /* UPLOAD BTN */
        .upload-section {
            display: none;
            width: 100%;
            margin-top: 12px;
        }
        .upload-section.visible { display: block; }
        .upload-btn {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,214,0,0.2); }
            50% { box-shadow: 0 0 25px rgba(255,214,0,0.4); }
        }
        .upload-btn:hover {
            background: rgba(255,214,0,0.1);
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            .main {
                grid-template-columns: 1fr;
            }
            .clicker-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .log-panel {
                border-left: none;
                border-top: 1px solid var(--border);
            }
            .log-feed, .upgrades-panel { max-height: 50vh; }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>

// ============ FORMAT HELPERS ============
function formatNum(n) {
    if (n < 1000) return n.toFixed(n < 10 ? 1 : 0);
    const suffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi'];
    const tier = Math.floor(Math.log10(Math.abs(n)) / 3);
    if (tier === 0) return n.toFixed(0);
    const suffix = suffixes[tier] || ('e' + tier * 3);
    const scale = Math.pow(10, tier * 3);
    const scaled = n / scale;
    return scaled.toFixed(scaled < 10 ? 2 : 1) + suffix;
}

function formatLifespan(s) {
    if (s < 60) return '+' + s.toFixed(4) + 's';
    if (s < 3600) return '+' + (s / 60).toFixed(2) + ' min';
    if (s < 86400) return '+' + (s / 3600).toFixed(2) + ' hrs';
    if (s < 31536000) return '+' + (s / 86400).toFixed(2) + ' days';
    return '+' + (s / 31536000).toFixed(2) + ' yrs';
}

function getTimestamp() {
    const elapsed = Math.floor((Date.now() - game.startTime) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    return m + ':' + s;
}

// ============ LOGGING ============
function addLog(msg, type = 'system') {
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + type;
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = '[' + getTimestamp() + ']';
    entry.appendChild(ts);
    entry.appendChild(document.createTextNode(msg));
    els.logFeed.insertBefore(entry, els.logFeed.firstChild);
    // Limit log entries
    while (els.logFeed.children.length > 100) {
        els.logFeed.removeChild(els.logFeed.lastChild);
    }
}

// ============ UPGRADE SYSTEM ============
function getUpgradeCost(u) {
    return Math.floor(u.baseCost * Math.pow(u.costMult, game.owned[u.id]));
}

function buyUpgrade(id) {
    if (game.ended) return;
    const u = UPGRADES.find(up => up.id === id);
    if (!u) return;
    const cost = getUpgradeCost(u);
    if (game.lifeForce < cost) return;

    game.lifeForce -= cost;
    game.owned[u.id]++;

    if (u.type === 'click') {
        game.clickPower += u.power;
        game.lifespanPerClick += u.lifespanBonus;
    }

    game.soulFatigue = Math.min(100, game.soulFatigue + u.soulCost);

    recalcLPS();

    // Log purchase
    addLog('Acquired: ' + u.name + ' (x' + game.owned[u.id] + ')', 'purchase');
    if (game.owned[u.id] === 1 && u.flavor) {
        setTimeout(() => addLog(u.flavor, 'techno'), 800);
    }

    if (u.id === 'consciousness') {
        game.hasConsciousness = true;
    }

    checkSoulMilestones();
    renderUpgrades();
}

function recalcLPS() {
    let lps = 0;
    let lifespanPerSec = 0;
    UPGRADES.forEach(u => {
        if (u.type === 'passive' && game.owned[u.id] > 0) {
            lps += u.lps * game.owned[u.id];
            lifespanPerSec += u.lifespanBonus * game.owned[u.id];
        }
    });
    if (game.sellingData) lps *= 1.5;
    game.lps = lps;
    game._lifespanPerSec = lifespanPerSec;
}

// ============ NARRATIVE ENGINE ============
function pickRandom(arr, used) {
    const available = arr.filter((_, i) => !used.includes(i));
    if (available.length === 0) {
        used.length = 0;
        return pickRandom(arr, used);
    }
    const idx = arr.indexOf(available[Math.floor(Math.random() * available.length)]);
    used.push(idx);
    return arr[idx];
}

function triggerNarrative() {
    if (game.ended) return;

// ============ GAME LOOP ============
let lastTick = Date.now();

function tick() {
    if (game.ended) { requestAnimationFrame(tick); return; }

    const now = Date.now();
    const dt = (now - lastTick) / 1000;
    lastTick = now;

    // Passive income
    if (game.lps > 0) {
        const gain = game.lps * dt;
        game.lifeForce += gain;
        game.totalLifeForce += gain;
    }

    // Passive lifespan
    if (game._lifespanPerSec > 0) {
        game.lifespanGained += game._lifespanPerSec * dt;
    }

    // Data selling soul cost
    if (game.sellingData) {
        game.soulFatigue = Math.min(100, game.soulFatigue + 0.02 * dt);
    }

    // Social cooldown
    if (game.socialCooldown > 0) {
        game.socialCooldown -= dt;
        if (game.socialCooldown <= 0) {
            game.socialCooldown = 0;
            els.socialBtn.disabled = false;
            els.socialBtn.textContent = 'Post to Social Media';
        } else {
            els.socialBtn.textContent = 'Posting... (' + Math.ceil(game.socialCooldown) + 's)';
        }
    }

    // Narrative events
    game.narrativeTimer += dt;
    const narrativeInterval = Math.max(8, 25 - game.soulFatigue * 0.15);
    if (game.narrativeTimer >= narrativeInterval && game.totalLifeForce > 30) {
        game.narrativeTimer = 0;
        triggerNarrative();
    }

    // Phase check
    checkPhase();

    // Upload availability
    if (game.hasConsciousness && !game.ended) {
        els.uploadSection.classList.add('visible');
        if (game.lifeForce >= game.uploadCost) {
            els.uploadBtn.style.opacity = '1';
            els.uploadBtn.disabled = false;
            els.uploadBtn.textContent = 'UPLOAD CONSCIOUSNESS (' + formatNum(game.uploadCost) + ' LF)';
        } else {
            els.uploadBtn.style.opacity = '0.4';
            els.uploadBtn.disabled = true;
            els.uploadBtn.textContent = 'UPLOAD CONSCIOUSNESS (' + formatNum(game.uploadCost) + ' LF)';
        }
    }

    // Render
    render();
    renderUpgrades();

    requestAnimationFrame(tick);
}

function render() {
    els.lifeForce.textContent = formatNum(game.lifeForce);
    els.lfPerSec.textContent = formatNum(game.lps);
    els.lifespan.textContent = formatLifespan(game.lifespanGained);
    els.totalClicks.textContent = game.totalClicks.toLocaleString();
    els.fatiguePct.textContent = Math.floor(game.soulFatigue) + '%';
    els.clickPowerDisplay.textContent = formatNum(game.clickPower);
    els.lifespanPerClickDisplay.textContent = game.lifespanPerClick.toFixed(4);

    els.soulPct.textContent = Math.floor(game.soulFatigue) + '%';
    els.followersDisplay.textContent = game.followers.toLocaleString();
}

// ============ SAVE / LOAD ============
function saveGame() {
    try {
        localStorage.setItem('eternallyGame', JSON.stringify(game));
    } catch(e) {}
}

function loadGame() {
    try {
        const data = localStorage.getItem('eternallyGame');
        if (data) {
            const saved = JSON.parse(data);
            Object.assign(game, saved);
            recalcLPS();
            checkPhase();
            checkSoulMilestones();
            if (game.phase >= 2) els.socialSection.classList.add('visible');
            if (game.phase >= 3) els.dataSection.classList.add('visible');
            if (game.sellingData) {
                els.dataToggle.textContent = 'Sell Biometric Data: ON';
                els.dataToggle.classList.add('active');
            }
            addLog('Session restored. The protocol continues.', 'system');
        }
    } catch(e) {}
}

}
