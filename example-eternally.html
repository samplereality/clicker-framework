                    Time spent playing: <span>${minutes} minutes</span><br>
                    <br>
                    Time you will never get back: <span>${minutes} minutes</span>
                `,
                kicker: 'Congratulations. You lived forever. Was it worth it?',
            };
        },
    },

    // -- Lifecycle hooks --
    onLoad: (g, wasRestored) => {
        if (!wasRestored) {
            g.log('Welcome to ETERNAL.LY. You are a tech billionaire. You are afraid of death.', 'system');
            setTimeout(() => g.log('Click the button. Consume vitamins. Extend your lifespan. Each click buys you 0.0001 seconds.', 'system'), 1500);
            setTimeout(() => g.log("It's not much. But it's a start. It has to be.", 'system'), 3500);
        }
        // Restore sell-data multiplier if it was active
        if (g.actionStates.sellData?.active) {
            g.setRateMultiplier('lifeForce', 1.5);
        }
    },

    onTick: (g, dt) => {
        // Lifespan passive accrual from upgrades is handled via bonuses.
        // No additional custom tick logic needed.
    },
});

// Start the game!
game.start();
</script>

</body>
